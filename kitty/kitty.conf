# include ./kitty-themes/themes/everforest.conf
include ./kitty-themes/themes/kanagawa.conf
# include ./themes/catppuccin-frappe.conf

font_family         FiraCode Nerd Font Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto
font_size           9.5

enable_audio_bell   no

# disble tabs
map kitty_mod+space no_op
map kitty_mod+t no_op

map ctrl+shift+equal       change_font_size all +1.0
# map ctrl+shift+plus       change_font_size all +1.0
map ctrl+shift+minus      change_font_size all -1.0
# map ctrl+shift+equal     change_font_size all 0

map shift+f5              load_config_file

cursor_trail 10

# Use Ctrl+Shift+C/V like most terminals
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Optional: copy on selection (like Alacritty)
copy_on_select yes

# Allow terminal apps (vim/tmux) to access clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary no-append
