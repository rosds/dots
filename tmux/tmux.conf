unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set-window-option -g mode-keys vi
set-window-option -g aggressive-resize

# may conflict with kitty
set -s set-clipboard off

bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'y'                send -X copy-pipe-and-cancel "xsel -i -b"
bind-key -T copy-mode-vi MouseDragEnd1Pane  send -X copy-pipe-and-cancel "xsel -i -b"

set -g default-shell /bin/zsh
set -g pane-border-status "off"

# Use the xterm-256color terminal
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",$TERM:RGB"

# reload config
bind-key r source-file ~/.tmux.conf\; display-message "~/.tmux.conf config"

# tpm plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'danyim/tmux-remote'
set -g @plugin 'Morantron/tmux-fingers'

set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# config
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @tmux-gruvbox 'dark'
# set -g @yank_selection 'clipboard'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
